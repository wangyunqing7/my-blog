baseURL: https://www.wangyunqing.top/
defaultContentLanguage: zh-cn
title: 我的个人博客
theme: PaperMod

# 多语言配置
languages:
  zh-cn:
    languageName: "简体中文"
    weight: 1
    title: "我的个人博客"
    author: "王云卿"
    description: "记录学习与生活的个人博客"
    keywords: ["博客", "技术", "生活"]
    params:
      homeInfoParams:
        Title: "你好，我是王云卿 👋"
        Content: >
          - 学生 · 程序员 · 电脑爱好者
          - 这里记录我的技术学习、生活点滴
  en:
    languageName: "English"
    weight: 2
    title: "My Blog"
    author: "Wang Yunqing"
    description: "A personal blog about learning and life"
    keywords: ["blog", "technology", "life"]
    params:
      homeInfoParams:
        Title: "Hi, I'm Wang Yunqing 👋"
        Content: >
          - Student · Programmer · Tech Enthusiast
          - Sharing my learning journey and life notes

# 网站基本信息
params:
  # 作者信息（RSS 等功能需要）
  author: "王云卿"

  # 主内容区域（首页文章列表来源）
  mainSections:
    - posts

  # 主题模式
  defaultTheme: auto
  ShowShareButtons: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: true
  ShowLastUpdated: true
  ShowScrollProgressBar: true

  # 社交链接（可选）
  socialIcons:
    - name: github
      url: "https://github.com/wangyunqing7"

  # Giscus 评论配置
  giscus:
    repo: "wangyunqing7/my-blog"
    repoId: "R_kgDORYTbWA"
    categoryId: "DIC_kwDORYTbWM4C5F3y"

# Google Analytics
services:
  googleAnalytics:
    ID: G-KPV2PT60K0 # 替换为你的 GA4 Measurement ID

# 菜单配置
menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 1
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 2
    - identifier: search
      name: 搜索
      url: /search/
      weight: 3
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 4
    - identifier: about
      name: 关于
      url: /about/
      weight: 5

# 输出格式配置（启用搜索索引）
outputs:
  home:
    - HTML
    - RSS
    - JSON  # 必需：用于搜索功能

# Markdown 配置
markup:
  highlight:
    lineNos: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true  # 允许 HTML 标签
