baseURL: https://www.wangyunqing.top/
languageCode: zh-cn
title: 我的个人博客
theme: PaperMod

# 网站基本信息
params:
  # 主内容区域（首页文章列表来源）
  mainSections:
    - posts

  # 作者信息
  author: "王云卿"

  # 网站描述
  description: "记录学习与生活的个人博客"

  # 关键词
  keywords: ["博客", "技术", "生活"]

  # 主题模式
  defaultTheme: auto
  ShowShareButtons: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: true


  # 主页配置
  homeInfoParams:
    Title: "你好，我是王云卿 👋"
    Content: >
      - 学生 · 程序员 · 电脑爱好者
      - 这里记录我的技术学习、生活点滴

  # 社交链接（可选）
  socialIcons:
    - name: github
      url: "https://github.com/wangyunqing7"

# Google Analytics
services:
  googleAnalytics:
    ID: G-KPV2PT60K0 # 替换为你的 GA4 Measurement ID

# 菜单配置
menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 1
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 2
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 3
    - identifier: about
      name: 关于
      url: /about/
      weight: 4

# Markdown 配置
markup:
  highlight:
    lineNos: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true  # 允许 HTML 标签
